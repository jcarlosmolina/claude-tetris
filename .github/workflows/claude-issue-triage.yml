name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    if: github.event.issue.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Issue Triage
        id: claude-triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} de este repo (Tetris en vanilla JS).
            1. Lee el issue: `gh issue view ${{ github.event.issue.number }}`.
            2. Lista los labels existentes: `gh label list`. Usa SOLO esos labels, nunca crees labels nuevos.
            3. Revisa el código relevante (game.js, index.html, style.css) para contextualizar el problema.
            4. Asigna los labels que apliquen con `gh issue edit ${{ github.event.issue.number }} --add-label "..."`. Si ninguno encaja bien, no asignes ninguno.
            5. Publica UN comentario en español con `gh issue comment ${{ github.event.issue.number }}` que incluya: resumen del problema, causa probable o zona de código afectada, y pasos sugeridos para implementar la solución. Indica al final que es un análisis automático generado por Claude.
            No modifiques código ni el cuerpo del issue.
          claude_args: '--allowed-tools "Bash(gh label list:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Read,Grep,Glob"'
