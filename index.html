<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" title="Cambiar a modo claro">🌙</button>
    <select id="skin-select" class="skin-select" title="Cambiar skin">
      <option value="retro">Retro</option>
      <option value="neon">Neon</option>
      <option value="pastel">Pastel</option>
      <option value="pixel">Pixel Art</option>
    </select>
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">RÉCORDS</span>
          <ol id="leaderboard-list" class="leaderboard-list"></ol>
          <div class="best-stats">
            <span>Mejor combo: <b id="best-combo">0</b></span>
            <span>Máx. líneas: <b id="best-lines">0</b></span>
          </div>
          <button id="reset-records-btn" class="reset-records-btn" type="button">Borrar récords</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="overlay-save" class="overlay-save hidden">
          <input id="name-input" type="text" maxlength="10" placeholder="Tu nombre" />
          <button id="save-score-btn" type="button">Guardar</button>
        </div>
        <div id="overlay-leaderboard" class="overlay-leaderboard hidden">
          <span class="label">TOP 5</span>
          <ol id="overlay-leaderboard-list" class="leaderboard-list"></ol>
        </div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box pause-box">
        <p class="overlay-title">PAUSA</p>

        <div id="pause-main-view" class="pause-view">
          <button id="resume-btn" class="menu-btn">Reanudar</button>
          <button id="restart-pause-btn" class="menu-btn">Reiniciar</button>
          <button id="controls-btn" class="menu-btn">Ver controles</button>

          <div class="level-select">
            <label for="start-level">Nivel inicial</label>
            <select id="start-level">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>

        <div id="pause-controls-view" class="pause-view hidden">
          <ul class="pause-controls-list">
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
          <button id="back-btn" class="menu-btn">Volver</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
